<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AiGENT - Carte des Matchs</title>

    <link rel="stylesheet" href="accueil.css" />
    <link rel="stylesheet" href="/leaflet/leaflet.css" />

    <style>
      /* ===== BOUTON MENU FLOTTANT ===== */
      .menu-toggle {
        position: fixed;
        top: 90px;
        left: 20px;
        width: 52px;
        height: 52px;
        border-radius: 50%;
        background: #ffffff;
        color: #000000;
        font-size: 26px;
        cursor: pointer;
        border: none;
        z-index: 3000;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.35);
      }

      .menu-toggle:hover {
        background: #f2f2f2;
      }

      /* ===== SIDEBAR ===== */
      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        width: 260px;
        height: 100vh;
        background: #000;
        color: #fff;
        transform: translateX(-100%);
        transition: transform 0.35s ease;
        z-index: 2000;
        padding: 20px;
        box-sizing: border-box;
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .sidebar .close-btn {
        position: absolute;
        top: 15px;
        right: 15px;
        font-size: 22px;
        cursor: pointer;
      }

      .sidebar h2 {
        margin-top: 40px;
        margin-bottom: 30px;
        font-size: 20px;
      }

      .sidebar ul {
        list-style: none;
        padding: 0;
      }

      .sidebar ul li {
        margin-bottom: 20px;
      }

      .sidebar ul li a {
        color: #fff;
        text-decoration: none;
        font-size: 16px;
      }

      .sidebar ul li a:hover {
        text-decoration: underline;
      }

      /* ===== OVERLAY ===== */
      .sidebar-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        z-index: 1500;
        display: none;
      }

      .sidebar-overlay.active {
        display: block;
      }
      /* Animation du background */
      body {
        background: linear-gradient(135deg, #a9c7f7, #e4bdf5);
        background-size: 400% 400%;
        animation: gradientBG 25s ease infinite;
        margin: 0;
        font-family: sans-serif;
      }

      @keyframes gradientBG {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      /* Conteneur principal */
      .content-wrapper {
        max-width: 1100px;
        margin: 70px auto 0 auto;
        padding: 0 20px 120px 20px; /* espace pour footer */
        box-sizing: border-box;
      }

      /* Titre de section */
      .section-title {
        font-size: 26px;
        font-weight: 700;
        margin-bottom: 20px;
        text-align: center;
      }

      /* Carte réactive */
      .map-container {
        width: 100%;
        max-width: 1100px;
        height: 60vh; /* 60% de la hauteur de la fenêtre */
        min-height: 350px; /* jamais trop petite */
        border-radius: 25px;
        overflow: hidden;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
        margin: 0 auto 40px auto; /* centrage et espace */
        transition: height 0.3s ease;
      }

      /* Footer fixe */
      .bottom-banner {
        text-align: center;
        padding: 16px;
        background: rgba(0, 0, 0, 0.65);
        font-size: 14px;
        border-top: 1px solid rgba(255, 255, 255, 0.12);
      }

      /* Logo et texte */
      .logo-text {
        font-size: 28px;
        font-weight: 700;
        background: linear-gradient(270deg, #659cef, #d194ed, #8fbafc);
        background-size: 400% 400%;
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: gradientBG 30s ease infinite;
      }

      /* Media queries pour écrans plus petits */
      @media (max-width: 768px) {
        .section-title {
          font-size: 22px;
        }

        .map-container {
          height: 50vh; /* réduit légèrement la carte */
        }
      }

      @media (max-width: 480px) {
        .section-title {
          font-size: 20px;
        }

        .map-container {
          height: 40vh; /* encore plus compacte sur mobile */
          min-height: 250px;
        }
      }

      .sidebar {
        display: flex;
        flex-direction: column;
        height: 100%;
      }

      .menu-links {
        list-style: none;
        padding: 0;
      }

      .menu-bottom {
        margin-top: auto;
        padding: 20px;
      }

      .home-link {
        display: flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
        color: inherit;
        transition:
          transform 0.3s ease,
          opacity 0.3s ease;
      }

      /* --- Animation porte --- */
      .home-link svg {
        transition: transform 0.4s ease;
        transform-origin: left center; /* charnière côté gauche */
      }

      /* --- Animation flèche (3e path du SVG) --- */
      .home-link svg path:last-child {
        transition: transform 0.3s ease;
      }

      /* --- Hover --- */
      .home-link:hover {
        transform: translateX(4px);
      }

      .home-link:hover svg {
        transform: rotateY(-20deg); /* ouverture légère */
      }

      .home-link:hover svg path:last-child {
        transform: translateX(-3px); /* flèche qui rentre un peu plus */
      }
    </style>
  </head>

  <body>
    <!-- ===== BOUTON MENU FLOTTANT ===== -->
    <button class="menu-toggle" id="openSidebar">☰</button>

    <!-- ===== SIDEBAR ===== -->
    <nav id="sidebar" class="sidebar">
      <span class="close-btn" id="closeSidebar">&times;</span>
      <h2>Menu</h2>

      <!-- Liens principaux -->
      <ul class="menu-links">
        <li><a href="profil.html">Profil & Compte</a></li>
        <li><a href="messagerie.html">Messagerie</a></li>
        <li><a href="favoris.html">Profils favoris</a></li>
        <li><a href="statistiques.html">Statistiques</a></li>
      </ul>

      <!-- Retour accueil placé tout en bas -->
      <div class="menu-bottom">
        <a href="accueil.html" class="home-link">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <!-- Porte -->
            <path d="M3 21h18"></path>
            <path d="M7 21V5a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v16"></path>
            <!-- Flèche qui rentre -->
            <path d="M12 11l-3 3 3 3"></path>
          </svg>
          <span><i>Retour à l'accueil</i></span>
        </a>
      </div>
    </nav>

    <div id="sidebarOverlay" class="sidebar-overlay"></div>
    <header class="top-banner">
      <div class="logo-container">
        <img src="images/logo.png" class="logo-img" />
        <h1 class="logo-text">Mon AiGENT Immobilier</h1>
      </div>
    </header>

    <main class="content-wrapper">
      <div class="section-title">
        🗺️ Carte Géographique des Matchs (30 meilleurs profils)
      </div>
      <div id="map" class="map-container"></div>
    </main>

    <footer class="bottom-banner">
      © Mon AiGENT Immobilier - Tous droits réservés
    </footer>

    <link rel="stylesheet" href="/leaflet/MarkerCluster.css" />
    <link rel="stylesheet" href="/leaflet/MarkerCluster.Default.css" />
    <script src="/leaflet/leaflet.js"></script>
    <script src="/leaflet/MarkerCluster.js"></script>
    <script src="/leaflet/leaflet.heat.js"></script>
    <script src="carte-matchs.js"></script>
  </body>
</html>
