<!doctype html>
<html lang="fr" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/images/favicon.ico" />
    <title>AiGENT - Map Intelligence</title>

    <link rel="stylesheet" href="carte-matchs.css" />
    <link rel="stylesheet" href="/leaflet/leaflet.css" />
  </head>

  <body>
    <div class="ambient-bg"></div>

    <!-- ===== BOUTON MENU FLOTTANT ===== -->
    <button class="menu-toggle" id="openSidebar" aria-label="Ouvrir le menu">
      <svg
        width="22"
        height="18"
        viewBox="0 0 22 18"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
      >
        <line x1="0" y1="2" x2="22" y2="2" />
        <line x1="0" y1="9" x2="16" y2="9" />
        <line x1="0" y1="16" x2="10" y2="16" />
      </svg>
    </button>

    <!-- ===== SIDEBAR NAV ===== -->
    <nav id="sidebar" class="sidebar-nav" aria-label="Navigation principale">
      <span class="close-btn" id="closeSidebar" aria-label="Fermer"
        >&times;</span
      >
      <h2>Menu</h2>
      <ul class="menu-links">
        <li>
          <a href="profil.html">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="8" r="4" />
              <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
            </svg>
            Profil &amp; Compte
          </a>
        </li>
        <li>
          <a href="messagerie.html">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"
              />
            </svg>
            Messagerie
          </a>
        </li>
        <li>
          <a href="favoris.html">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"
              />
            </svg>
            Profils favoris
          </a>
        </li>
        <li>
          <a href="statistiques.html">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <line x1="18" y1="20" x2="18" y2="10" />
              <line x1="12" y1="20" x2="12" y2="4" />
              <line x1="6" y1="20" x2="6" y2="14" />
            </svg>
            Statistiques Globales
          </a>
        </li>
      </ul>
      <div class="menu-bottom">
        <a href="accueil.html" class="home-link">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M3 21h18" />
            <path d="M7 21V5a2 2 0 012-2h6a2 2 0 012 2v16" />
            <path d="M12 11l-3 3 3 3" />
          </svg>
          <span>Retour à l'accueil</span>
        </a>
      </div>
    </nav>

    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <!-- HEADER PRO -->
    <!-- ===== HEADER CORRIGÉ ===== -->
    <header class="top-banner">
      <div class="logo-container">
        <img src="images/logo.png" class="logo-img" alt="Logo" />
        <h1 class="logo-text">Map Intelligence</h1>
      </div>

      <div class="header-actions">
        <!-- Le bouton thème est maintenant bien placé avant la déconnexion -->
        <button id="btn-theme" aria-label="Changer le thème">
          <svg
            class="icon-sun"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="12" cy="12" r="5" />
            <line x1="12" y1="1" x2="12" y2="3" />
            <line x1="12" y1="21" x2="12" y2="23" />
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
            <line x1="1" y1="12" x2="3" y2="12" />
            <line x1="21" y1="12" x2="23" y2="12" />
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
          </svg>
          <svg
            class="icon-moon"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
          </svg>
        </button>

        <button id="btn-logout" class="logout-btn-minimal">Déconnexion</button>
      </div>
    </header>

    <main class="dashboard-layout">
      <!-- STATS TOP BAR -->
      <section class="stats-row">
        <div class="stat-glass-card">
          <span class="stat-label">Matchs identifiés</span>
          <span class="stat-number" id="stat-count">0</span>
        </div>
        <div class="stat-glass-card">
          <span class="stat-label">Compatibilité Moyenne</span>
          <span class="stat-number" id="stat-avg">0%</span>
        </div>
        <div class="stat-glass-card">
          <span class="stat-label">Zone de tension</span>
          <span class="stat-number" id="stat-zone">N/A</span>
        </div>
      </section>

      <!-- MAP SECTION -->
      <section class="map-section">
        <div id="map" class="map-canvas"></div>

        <!-- FLOATING FILTERS (GLASS) -->
        <div class="map-filters-overlay">
          <div class="filter-item">
            <label>Score min.</label>
            <input type="range" id="filterScore" min="0" max="100" value="0" />
            <span id="scoreValue">0%</span>
          </div>
          <div class="filter-item">
            <label>Type</label>
            <select id="filterType">
              <option value="all">Tous</option>
              <option value="maison">Maison</option>
              <option value="appartement">Appartement</option>
            </select>
          </div>
          <div class="filter-item">
            <button id="resetFilters" class="btn-reset-icon">↺</button>
          </div>
        </div>
      </section>
    </main>

    <footer class="bottom-banner">
      © Mon AiGENT Immobilier - Excellence Géographique
    </footer>

    <!-- SCRIPTS -->
    <script src="/leaflet/leaflet.js"></script>
    <script src="/leaflet/leaflet.heat.js"></script>
    <script src="carte-matchs.js"></script>
  </body>
</html>
