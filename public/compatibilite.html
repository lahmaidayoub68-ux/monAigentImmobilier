<!doctype html>
<html lang="fr" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/images/favicon.ico" />
    <title>AiGENT - Analyse Stratégique de Compatibilité</title>

    <!-- Chart.js & Leaflet -->
    <script src="js/chart.umd.min.js"></script>

    <style>
      /* ============================================================
         VARIABLES GLOBALES (THEMES DARK & LIGHT)
      ============================================================ */
      :root,
      [data-theme="dark"] {
        --primary-grad: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);
        --bg-dark: #0d0d12;
        --bg-panel: #111118;
        --bg-surface: #1a1a26;
        --glass-bg: rgba(17, 17, 25, 0.8);
        --glass-border: rgba(139, 92, 246, 0.2);
        --text-main: #e2e8f0;
        --text-muted: #94a3b8;
        --radius-pro: 20px;
        --violet-glow: 0 0 20px rgba(139, 92, 246, 0.2);
        --pink-glow: 0 0 20px rgba(236, 72, 153, 0.15);

        --theme-icon-sun: none;
        --theme-icon-moon: block;
      }

      [data-theme="light"] {
        --bg-dark: #f1f3f8;
        --bg-panel: #ffffff;
        --bg-surface: #ffffff;
        --glass-bg: rgba(255, 255, 255, 0.9);
        --glass-border: rgba(139, 92, 246, 0.15);
        --text-main: #1e293b;
        --text-muted: #64748b;

        --theme-icon-sun: block;
        --theme-icon-moon: none;
      }

      /* RESET & BASE */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", system-ui, sans-serif;
      }
      body {
        background: var(--bg-dark);
        color: var(--text-main);
        min-height: 100vh;
        transition:
          background 0.3s,
          color 0.3s;
      }

      /* Background radial animé signature */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        background:
          radial-gradient(
            circle at 15% 15%,
            rgba(139, 92, 246, 0.1),
            transparent 40%
          ),
          radial-gradient(
            circle at 85% 85%,
            rgba(236, 72, 153, 0.08),
            transparent 40%
          );
      }

      /* =====================================
         HEADER (FIXE NOIR PRO)
      ===================================== */
      .top-banner {
        background: #0a0a0f !important; /* Reste noir même en light mode */
        padding: 12px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid rgba(139, 92, 246, 0.2);
        backdrop-filter: blur(12px);
        position: sticky;
        top: 0;
        z-index: 1000;
      }
      .logo-container {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .logo-img {
        width: 44px;
      }
      .logo-text {
        font-size: 22px;
        font-weight: 800;
        background: var(--primary-grad);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .header-right {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      /* BOUTON THÈME */
      #btn-theme {
        width: 40px;
        height: 40px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #fff;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: 0.3s;
      }
      #btn-theme:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: #8b5cf6;
      }
      .icon-sun {
        display: var(--theme-icon-sun);
      }
      .icon-moon {
        display: var(--theme-icon-moon);
      }

      /* =====================================
         LAYOUT DASHBOARD
      ===================================== */
      .main-dashboard {
        max-width: 1400px;
        margin: 40px auto;
        padding: 0 24px;
        display: grid;
        grid-template-columns: 1fr 340px;
        gap: 30px;
      }

      .kpi-row {
        grid-column: 1 / -1;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 20px;
      }
      .kpi-card {
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-pro);
        padding: 24px;
        transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        overflow: hidden;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }
      .kpi-card:hover {
        transform: translateY(-5px);
        border-color: #ec4899;
        box-shadow: var(--violet-glow);
      }
      .kpi-card::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 3px;
        background: var(--primary-grad);
      }
      .kpi-label {
        font-size: 11px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 8px;
      }
      .kpi-value {
        font-size: 32px;
        font-weight: 800;
        color: var(--text-main);
      }

      /* Boost: Animation pulse sur le meilleur match */
      .kpi-card.pulse .kpi-value {
        animation: pulseText 2s infinite;
      }
      @keyframes pulseText {
        0% {
          opacity: 1;
        }
        50% {
          opacity: 0.7;
          color: #ec4899;
        }
        100% {
          opacity: 1;
        }
      }

      /* =====================================
         GRAPHIQUE HERO
      ===================================== */
      .chart-hero {
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        padding: 30px;
        display: flex;
        flex-direction: column;
        box-shadow: var(--shadow-soft);
        position: relative;
      }
      .chart-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
      }
      .chart-header h2 {
        font-size: 20px;
        font-weight: 700;
        color: var(--text-main);
      }

      .control-btn {
        width: 40px;
        height: 40px;
        border-radius: 12px;
        background: rgba(139, 92, 246, 0.1);
        border: 1px solid var(--glass-border);
        color: var(--text-main);
        cursor: pointer;
        transition: 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .control-btn:hover {
        background: var(--primary-grad);
        color: #fff;
        transform: scale(1.1);
      }

      .chart-stage {
        flex: 1;
        min-height: 450px;
        position: relative;
      }

      .filter-bar {
        display: flex;
        gap: 12px;
        margin-top: 25px;
        padding-top: 20px;
        border-top: 1px solid var(--glass-border);
        flex-wrap: wrap;
      }
      .saas-select {
        background: var(--bg-surface);
        border: 1px solid var(--glass-border);
        color: var(--text-main);
        padding: 10px 15px;
        border-radius: 12px;
        font-size: 13px;
        outline: none;
        cursor: pointer;
        transition: 0.2s;
      }
      .saas-select:hover {
        border-color: #ec4899;
      }

      /* TILES */
      .breakdown-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 15px;
        margin-top: 30px;
      }
      .tile {
        background: rgba(139, 92, 246, 0.05);
        border: 1px solid var(--glass-border);
        padding: 16px;
        border-radius: 16px;
        text-align: center;
      }
      .tile-label {
        font-size: 10px;
        color: var(--text-muted);
        text-transform: uppercase;
        margin-bottom: 8px;
      }
      .tile-score {
        font-size: 20px;
        font-weight: 700;
        color: var(--text-main);
      }
      .tile-bar {
        height: 5px;
        background: rgba(0, 0, 0, 0.2);
        border-radius: 10px;
        margin-top: 10px;
        overflow: hidden;
      }
      .tile-bar-fill {
        height: 100%;
        background: var(--primary-grad);
        width: 0;
        transition: width 1.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      /* =====================================
         MATCH SIDEBAR
      ===================================== */
      .match-sidebar {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      .sidebar-title {
        font-size: 16px;
        font-weight: 700;
        color: var(--text-main);
      }

      .match-tabs {
        display: flex;
        flex-direction: column;
        gap: 12px;
        max-height: 75vh;
        overflow-y: auto;
        padding-right: 8px;
      }
      /* Boost: Scrollbar stylisée */
      .match-tabs::-webkit-scrollbar {
        width: 5px;
      }
      .match-tabs::-webkit-scrollbar-thumb {
        background: var(--primary-grad);
        border-radius: 10px;
      }

      .tab-item {
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        padding: 18px;
        border-radius: 18px;
        cursor: pointer;
        transition: 0.3s;
        display: flex;
        align-items: center;
        gap: 15px;
        text-decoration: none;
      }
      .tab-item:hover {
        transform: translateX(-8px);
        border-color: #ec4899;
        background: var(--bg-surface);
      }
      .tab-item.active {
        border-color: #ec4899;
        box-shadow: var(--pink-glow);
        background: linear-gradient(
          90deg,
          rgba(139, 92, 246, 0.1),
          rgba(236, 72, 153, 0.1)
        );
      }
      .tab-pct {
        width: 42px;
        height: 42px;
        border-radius: 10px;
        background: var(--primary-grad);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 800;
        color: #fff;
      }
      .tab-name {
        font-size: 14px;
        font-weight: 600;
        color: var(--text-main);
      }
      .tab-loc {
        font-size: 11px;
        color: var(--text-muted);
      }

      /* =====================================
         MENU & SIDEBAR NAVIGATION
      ===================================== */
      .menu-toggle {
        position: fixed;
        top: 80px;
        left: 16px;
        width: 48px;
        height: 48px;
        border-radius: 50%;
        border: none;
        background: var(--primary-grad);
        color: white;
        cursor: pointer;
        z-index: 3000;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: var(--violet-glow);
        transition: 0.3s;
      }
      .menu-toggle:hover {
        transform: scale(1.1) rotate(90deg);
      }

      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        width: 270px;
        height: 100vh;
        background: #0a0a0f;
        border-right: 1px solid var(--glass-border);
        transform: translateX(-100%);
        transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 4000;
        padding: 30px;
      }
      .sidebar.open {
        transform: translateX(0);
        box-shadow: 20px 0 60px rgba(0, 0, 0, 0.5);
      }
      .sidebar h2 {
        background: var(--primary-grad);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        font-size: 22px;
        margin-bottom: 40px;
        font-weight: 800;
      }
      .sidebar ul {
        list-style: none;
      }
      .sidebar ul li {
        margin-bottom: 22px;
      }
      .sidebar ul li a {
        color: #94a3b8;
        text-decoration: none;
        font-size: 15px;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 12px;
        transition: 0.3s;
      }
      .sidebar ul li a:hover {
        color: #fff;
        transform: translateX(10px);
      }

      .close-sidebar-btn {
        position: absolute;
        top: 20px;
        right: 20px;
        cursor: pointer;
        color: var(--text-muted);
        transition: 0.3s;
      }
      .close-sidebar-btn:hover {
        color: #ec4899;
        transform: scale(1.2);
      }

      /* FULLSCREEN CHART */
      .chart-hero.fullscreen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        border-radius: 0;
        background: #050505;
        padding: 40px;
      }
      /* Style pour les icônes de navigation de vues */
      .vue-svg {
        width: 24px;
        height: 24px;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        filter: drop-shadow(0 0 2px rgba(139, 92, 246, 0.3));
      }

      /* Effet quand on survole le bouton qui contient l'icône */
      .control-btn:hover .vue-svg {
        transform: scale(1.15) rotate(-5deg);
        filter: drop-shadow(0 0 8px rgba(236, 72, 153, 0.6));
      }

      /* Optionnel : si tes tuiles (tiles) utilisent aussi ces SVGs */
      .tile:hover .vue-svg {
        transform: translateY(-3px);
        filter: drop-shadow(0 4px 10px rgba(139, 92, 246, 0.5));
      }

      /* ============================================================
   COMPATIBILITE.HTML — RESPONSIVE PRO MAX NIVEAU APPLE
   Mobile-first. Desktop = intact.
============================================================ */

      /* ============================================================
   BASE MOBILE (< 768px)
============================================================ */

      html {
        -webkit-text-size-adjust: 100%;
      }

      body {
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
      }

      /* HEADER */
      .top-banner {
        padding: 10px 16px;
        gap: 8px;
      }
      .logo-img {
        width: 32px;
      }
      .logo-text {
        font-size: 16px;
      }
      .header-right {
        gap: 8px;
      }
      .control-btn,
      #btn-theme {
        width: 36px;
        height: 36px;
        border-radius: 10px;
      }

      /* MENU FAB */
      .menu-toggle {
        top: 72px;
        left: 16px;
        width: 44px;
        height: 44px;
      }

      /* SIDEBAR */
      .sidebar {
        width: min(80vw, 270px);
      }

      /* ── LAYOUT PRINCIPAL ── */
      .main-dashboard {
        display: flex;
        flex-direction: column;
        gap: 16px;
        padding: 16px;
        margin: 0;
        max-width: 100%;
      }

      /* ── KPI ROW ── */
      .kpi-row {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }
      .kpi-card {
        padding: 14px 10px;
        border-radius: 16px;
        /* Barre gradient en bas */
      }
      .kpi-label {
        font-size: 9px;
        letter-spacing: 0.5px;
        margin-bottom: 6px;
      }
      .kpi-value {
        font-size: 22px;
        line-height: 1;
        letter-spacing: -0.5px;
      }

      /* ── CHART HERO — cœur de l'app ── */
      .chart-hero {
        padding: 16px;
        border-radius: 20px;
        /* Ordre : chart avant tabs sur mobile */
        order: 1;
      }
      .chart-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
        gap: 8px;
      }
      .chart-header h2 {
        font-size: 15px;
        font-weight: 700;
        flex: 1;
        min-width: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .chart-controls {
        display: flex;
        gap: 6px;
        flex-shrink: 0;
      }
      .chart-controls .control-btn {
        width: 34px;
        height: 34px;
        border-radius: 10px;
      }

      /* LE GRAPHIQUE : ni trop grand ni trop petit — c'est le cœur */
      .chart-stage {
        min-height: 260px;
        height: 40vw;
        max-height: 320px;
        position: relative;
      }
      .chart-stage canvas {
        width: 100% !important;
        height: 100% !important;
      }

      /* FILTER BAR */
      .filter-bar {
        display: flex;
        gap: 8px;
        margin-top: 14px;
        padding-top: 14px;
        flex-wrap: nowrap;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        /* Pas de scrollbar visible */
        padding-bottom: 4px;
      }
      .filter-bar::-webkit-scrollbar {
        display: none;
      }

      .saas-select {
        padding: 8px 10px;
        border-radius: 10px;
        font-size: 12px;
        flex-shrink: 0;
        min-width: 0;
        max-width: 130px;
        /* Évite l'overflow sur les options longues */
        text-overflow: ellipsis;
        overflow: hidden;
        white-space: nowrap;
      }

      /* BREAKDOWN TILES */
      .breakdown-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        margin-top: 14px;
      }
      .tile {
        padding: 12px 10px;
        border-radius: 12px;
      }
      .tile-label {
        font-size: 9px;
      }
      .tile-score {
        font-size: 17px;
      }

      /* ── SIDEBAR MATCHS / TABS ── */
      .match-sidebar {
        order: 2;
        gap: 12px;
      }
      .sidebar-title {
        font-size: 13px;
        font-weight: 700;
        padding-left: 2px;
      }

      /* TABS : scroll horizontal sur mobile — rien ne dépasse */
      .match-tabs {
        display: flex;
        flex-direction: row;
        gap: 10px;
        overflow-x: auto;
        overflow-y: hidden;
        max-height: none;
        padding-bottom: 6px;
        padding-right: 0;
        scroll-snap-type: x mandatory;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      .match-tabs::-webkit-scrollbar {
        display: none;
      }

      .tab-item {
        flex-shrink: 0;
        min-width: 200px;
        max-width: 220px;
        scroll-snap-align: start;
        padding: 14px;
        border-radius: 16px;
        gap: 10px;
        /* Tap feedback iOS */
        -webkit-tap-highlight-color: transparent;
      }
      .tab-item:hover {
        transform: none;
      }
      .tab-item:active {
        transform: scale(0.97);
        opacity: 0.85;
      }
      .tab-pct {
        width: 38px;
        height: 38px;
        min-width: 38px;
        border-radius: 10px;
        font-size: 12px;
      }
      .tab-name {
        font-size: 13px;
      }
      .tab-loc {
        font-size: 11px;
      }

      /* FULLSCREEN : désactivé sur mobile (inutile et buggy) */
      @media (max-width: 767px) {
        .chart-hero.fullscreen {
          position: static !important;
          inset: auto !important;
          border-radius: 20px !important;
          background: var(--glass-bg) !important;
          padding: 16px !important;
        }
      }

      /* ============================================================
   TABLETTE (640px – 1099px)
============================================================ */
      @media (min-width: 640px) {
        .main-dashboard {
          padding: 20px;
          gap: 20px;
        }

        .kpi-value {
          font-size: 28px;
        }
        .kpi-label {
          font-size: 10px;
        }
        .kpi-card {
          padding: 18px 16px;
        }

        .chart-stage {
          height: 45vw;
          max-height: 380px;
          min-height: 300px;
        }

        .match-tabs {
          gap: 12px;
          padding-bottom: 8px;
        }
        .tab-item {
          min-width: 240px;
          max-width: 260px;
          padding: 16px;
        }
      }

      /* ============================================================
   DESKTOP (≥ 1100px) — ton design original INTACT
============================================================ */
      @media (min-width: 1100px) {
        .main-dashboard {
          display: grid;
          grid-template-columns: 1fr 340px;
          gap: 30px;
          padding: 0 24px;
          margin: 40px auto;
          max-width: 1400px;
        }

        .kpi-row {
          grid-column: 1 / -1;
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
          gap: 20px;
        }
        .kpi-card {
          padding: 24px;
          border-radius: 20px;
        }
        .kpi-value {
          font-size: 32px;
          letter-spacing: 0;
        }
        .kpi-label {
          font-size: 11px;
          letter-spacing: 1px;
        }

        .chart-hero {
          padding: 30px;
          border-radius: 24px;
          order: 0;
        }
        .chart-header {
          margin-bottom: 30px;
        }
        .chart-header h2 {
          font-size: 20px;
          white-space: normal;
          overflow: visible;
          text-overflow: clip;
        }
        .chart-controls .control-btn {
          width: 40px;
          height: 40px;
        }

        /* Graphique desktop : taille généreuse */
        .chart-stage {
          min-height: 450px;
          height: auto;
          max-height: none;
        }

        .filter-bar {
          flex-wrap: wrap;
          overflow-x: visible;
          padding-bottom: 0;
          margin-top: 25px;
          padding-top: 20px;
        }
        .saas-select {
          padding: 10px 15px;
          font-size: 13px;
          max-width: none;
        }

        .breakdown-grid {
          grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
          gap: 15px;
          margin-top: 30px;
        }
        .tile {
          padding: 16px;
          border-radius: 16px;
        }
        .tile-label {
          font-size: 10px;
        }
        .tile-score {
          font-size: 20px;
        }

        .match-sidebar {
          display: flex;
          flex-direction: column;
          gap: 20px;
          order: 0;
        }
        .sidebar-title {
          font-size: 16px;
        }

        .match-tabs {
          flex-direction: column;
          overflow-x: hidden;
          overflow-y: auto;
          max-height: 75vh;
          padding-right: 8px;
          padding-bottom: 0;
          scroll-snap-type: none;
        }
        .tab-item {
          min-width: 0;
          max-width: none;
          scroll-snap-align: none;
          padding: 18px;
          border-radius: 18px;
          gap: 15px;
        }
        .tab-item:hover {
          transform: translateX(-8px);
        }
        .tab-pct {
          width: 42px;
          height: 42px;
          font-size: 13px;
        }
        .tab-name {
          font-size: 14px;
        }
        .tab-loc {
          font-size: 11px;
        }

        .menu-toggle {
          top: 80px;
          left: 16px;
          width: 48px;
          height: 48px;
        }
      }
    </style>
  </head>

  <body>
    <!-- Définition globale du dégradé pour les SVGs -->
    <svg width="0" height="0" style="position: absolute">
      <defs>
        <linearGradient id="grad-ai" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color: #8b5cf6; stop-opacity: 1" />
          <stop offset="100%" style="stop-color: #ec4899; stop-opacity: 1" />
        </linearGradient>
      </defs>
    </svg>
    <!-- HEADER -->
    <header class="top-banner">
      <div class="logo-container">
        <img src="images/logo.png" class="logo-img" alt="Logo" />
        <h1 class="logo-text">Mon AiGENT</h1>
      </div>
      <div class="header-right">
        <!-- Boost: Bouton Thème Jour/Nuit -->
        <button id="btn-theme" title="Changer de mode">
          <svg
            class="icon-sun"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="12" cy="12" r="5" />
            <line x1="12" y1="1" x2="12" y2="3" />
            <line x1="12" y1="21" x2="12" y2="23" />
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
            <line x1="1" y1="12" x2="3" y2="12" />
            <line x1="21" y1="12" x2="23" y2="12" />
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
          </svg>
          <svg
            class="icon-moon"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
        </button>

        <button
          class="control-btn"
          onclick="window.location.href = 'accueil.html'"
          title="Retour accueil"
        >
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
            <polyline points="9 22 9 12 15 12 15 22" />
          </svg>
        </button>
      </div>
    </header>

    <!-- ===== BOUTON MENU FLOTTANT ===== -->
    <!-- APRÈS -->
    <button class="menu-toggle" id="openSidebar" aria-label="Ouvrir le menu">
      <svg
        width="22"
        height="18"
        viewBox="0 0 22 18"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
      >
        <line x1="0" y1="2" x2="22" y2="2" />
        <line x1="0" y1="9" x2="16" y2="9" />
        <line x1="0" y1="16" x2="10" y2="16" />
      </svg>
    </button>

    <!-- ===== MENU LATÉRAL ===== -->
    <nav id="sidebar" class="sidebar" aria-label="Menu principal">
      <span class="close-btn" id="closeSidebar">&times;</span>
      <h2>Menu</h2>
      <ul>
        <li>
          <a href="profil.html">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
            Profil & Compte
          </a>
        </li>
        <li>
          <a href="messagerie.html">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"
              ></path>
            </svg>
            Messagerie
          </a>
        </li>
        <li>
          <a href="favoris.html">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <polygon
                points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"
              ></polygon>
            </svg>
            Profils favoris
          </a>
        </li>
        <li>
          <a href="statistiques.html">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <line x1="18" y1="20" x2="18" y2="10"></line>
              <line x1="12" y1="20" x2="12" y2="4"></line>
              <line x1="6" y1="20" x2="6" y2="14"></line>
            </svg>
            Statistiques
          </a>
        </li>
      </ul>
      <div class="menu-bottom">
        <a href="accueil.html" class="home-link">Retour à l'accueil</a>
      </div>
    </nav>
    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <main class="main-dashboard">
      <!-- KPI -->
      <div class="kpi-row">
        <div class="kpi-card">
          <span class="kpi-label">Profils Analysés</span>
          <div class="kpi-value" id="matchCounter">0</div>
        </div>
        <div class="kpi-card">
          <span class="kpi-label">Compatibilité Moyenne</span>
          <div class="kpi-value"><span id="avgCompat">0</span>%</div>
        </div>
        <div class="kpi-card pulse">
          <span class="kpi-label">Meilleur Match</span>
          <div class="kpi-value"><span id="topCompat">0</span>%</div>
        </div>
      </div>

      <!-- CENTRE: GRAPH -->
      <div class="chart-section">
        <div class="chart-hero" id="mainGraphContainer">
          <div class="chart-header">
            <h2 id="graphTitle">Analyse Comparative</h2>
            <div class="chart-controls">
              <button id="focusMode" class="control-btn" title="Plein écran">
                <svg
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path
                    d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"
                  />
                </svg>
              </button>
              <button id="exportPNG" class="control-btn" title="Export Image">
                <svg
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path
                    d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4m4-5 3 3 3-3m-3-9v12"
                  />
                </svg>
              </button>
              <button id="refreshData" class="control-btn" title="Actualiser">
                <svg
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path
                    d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8m0 0V2m0 6h-6m6 4a9 9 0 1 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16m0 0v6m0-6h6"
                  />
                </svg>
              </button>
            </div>
          </div>

          <div class="chart-stage">
            <canvas id="dynamicChart"></canvas>
          </div>

          <div class="filter-bar">
            <select id="scoreFilter" class="saas-select">
              <option value="0">Tous les scores</option>
              <option value="60">Min. 60%</option>
              <option value="80">Min. 80%</option>
            </select>
            <select id="typeFilter" class="saas-select">
              <option value="all">Tous les biens</option>
            </select>
            <select id="cityFilter" class="saas-select">
              <option value="all">Toutes les villes</option>
            </select>
          </div>

          <div class="breakdown-grid" id="criteriaScoreCards"></div>
        </div>
      </div>

      <!-- SIDEBAR MATCHS -->
      <aside class="match-sidebar">
        <h3 class="sidebar-title">Sélecteur de Profil</h3>
        <div class="match-tabs" id="tabsContainer">
          <p
            style="
              color: var(--text-muted);
              font-size: 13px;
              text-align: center;
              padding-top: 20px;
            "
          >
            Analyse en cours...
          </p>
        </div>
      </aside>
    </main>

    <!-- Ton fichier JS externe qui gère Chart.js -->
    <script src="compatibilite.js"></script>
  </body>
</html>
